server {
    listen 80;
    server_name leadgenlink.site www.leadgenlink.site;
    return 301 https://leadgenlink.site$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name leadgenlink.site;

    ssl_certificate /etc/letsencrypt/live/leadgenlink.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leadgenlink.site/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }
}
