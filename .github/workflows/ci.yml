name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: cpl_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: mysql://root:test@localhost:3306/cpl_test
      AUTH_SECRET: ci-test-secret-key-min-32-chars-long
      AUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npx prisma migrate deploy
        continue-on-error: true

      - run: npx prisma db push

      - run: npm run db:seed
        continue-on-error: true

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test:unit

      - run: npm run build
