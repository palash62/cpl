name: Docker images (GHCR)

# Build Next.js off the 2GB VPS, push package-only images to GHCR.
# Server then: bash deploy/docker-run.sh  (pull only)

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npm run generate --workspace @cpl/database

      - name: Production build
        run: npm run build:production
        env:
          NODE_ENV: production

      - name: Prepare standalone
        run: bash deploy/prepare-standalone.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image names
        id: meta
        run: |
          OWNER="${{ github.repository_owner }}"
          OWNER_LC="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          SHA_SHORT="$(echo "${{ github.sha }}" | cut -c1-7)"
          echo "platform=ghcr.io/${OWNER_LC}/cpl-platform" >> "$GITHUB_OUTPUT"
          echo "tracking=ghcr.io/${OWNER_LC}/cpl-tracking" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA_SHORT" >> "$GITHUB_OUTPUT"

      - name: Build & push platform
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.platform
          push: true
          no-cache: true
          tags: |
            ${{ steps.meta.outputs.platform }}:latest
            ${{ steps.meta.outputs.platform }}:${{ steps.meta.outputs.sha }}

      - name: Build & push tracking
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tracking
          push: true
          no-cache: true
          tags: |
            ${{ steps.meta.outputs.tracking }}:latest
            ${{ steps.meta.outputs.tracking }}:${{ steps.meta.outputs.sha }}

      - name: Summary
        run: |
          echo "### Images pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.platform }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.tracking }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "On the 2GB server: \`bash deploy/docker-run.sh\`" >> "$GITHUB_STEP_SUMMARY"
