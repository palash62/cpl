# Runtime-only for low-RAM servers (~2GB).
# NEVER compile Next.js on the VPS — pull prebuilt images from GHCR.
#
# Laptop / CI (enough RAM):
#   bash deploy/docker-build-images.sh
#   bash deploy/docker-push.sh
#   # or: push to master → GitHub Action builds & pushes
#
# 2GB server (once):
#   cp deploy/docker-registry.env.example deploy/docker-registry.env
#   # edit GHCR_OWNER if needed; docker login ghcr.io (PAT with read:packages)
#   bash deploy/docker-run.sh
#
# Budget (~2GB host, MySQL native outside Docker):
#   platform  ~900MB | tracking ~500MB | OS+MySQL ~600MB+
#
# network_mode: host so DATABASE_URL host=localhost reaches MySQL on the VPS
# (Linux only — the production target).

services:
  platform:
    image: ${CPL_PLATFORM_IMAGE:-ghcr.io/palash62/cpl-platform:latest}
    container_name: cpl-platform
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./apps/platform/.env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NODE_OPTIONS: "--max-old-space-size=768"
    mem_limit: 900m
    memswap_limit: 900m
    cpus: 1.0
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/login').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  tracking:
    image: ${CPL_TRACKING_IMAGE:-ghcr.io/palash62/cpl-tracking:latest}
    container_name: cpl-tracking
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./apps/tracking/.env
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
      NODE_OPTIONS: "--max-old-space-size=384"
    mem_limit: 500m
    memswap_limit: 500m
    cpus: 0.5
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/track.js').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
